name: Publish

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Confirm manual publish (must match a v* tag on the current ref)'
        required: true
        type: boolean
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Require manual confirmation
        if: ${{ github.event_name == 'workflow_dispatch' && !inputs.confirm }}
        run: |
          echo "::error::Manual publish requires confirm=true."
          exit 1

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.12

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Read package version
        id: package
        run: |
          version="$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version")"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Verify release ref matches package version
        env:
          EVENT_NAME: ${{ github.event_name }}
          EXPECTED_TAG: v${{ steps.package.outputs.version }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$EVENT_NAME" = "push" ]; then
            if [ "$REF_NAME" != "$EXPECTED_TAG" ]; then
              echo "::error::Tag $REF_NAME does not match package version ${{ steps.package.outputs.version }}."
              exit 1
            fi
            exit 0
          fi

          matching_tag="$(git tag --points-at HEAD --list "$EXPECTED_TAG")"
          if [ "$matching_tag" != "$EXPECTED_TAG" ]; then
            echo "::error::Expected HEAD to be tagged with $EXPECTED_TAG before manual publish."
            exit 1
          fi

      - name: Upgrade npm for trusted publishing
        run: npm install --global npm@11.10.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Check formatting
        run: bun run fmt:check

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

      - name: Smoke test Node import
        run: bun run smoke:node

      - name: Verify publish tarball
        run: bun run pack:check

      - name: Publish package
        run: npm publish --access public --provenance
